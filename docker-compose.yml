services:
  # ── API Server ──────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - STORAGE_MODE=${STORAGE_MODE:-local}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-eyecon}
      - STREAM_SECRET=${STREAM_SECRET:-change-me-in-production}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-5120}
      - SEGMENT_DURATION=${SEGMENT_DURATION:-4}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - uploads:/app/uploads
      - streams:/app/streams
      - thumbnails:/app/thumbnails
      - db-data:/app
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Transcoding Worker ──────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - STORAGE_MODE=${STORAGE_MODE:-local}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-eyecon}
      - SEGMENT_DURATION=${SEGMENT_DURATION:-4}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - CLEANUP_INTERVAL_HOURS=${CLEANUP_INTERVAL_HOURS:-6}
    volumes:
      - uploads:/app/uploads
      - streams:/app/streams
      - thumbnails:/app/thumbnails
      - db-data:/app
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    # Scale workers: docker compose up --scale worker=4
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # ── Redis (Job Queue) ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Nginx (Reverse Proxy + Static Serving) ─────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - streams:/data/streams:ro
      - thumbnails:/data/thumbnails:ro
    depends_on:
      - app
    restart: unless-stopped

  # ── MinIO (Object Storage) — Optional ──────────────────────────────
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    profiles:
      - s3  # Only starts if STORAGE_MODE=s3 or explicitly: docker compose --profile s3 up

volumes:
  uploads:
  streams:
  thumbnails:
  db-data:
  redis-data:
  minio-data:
