worker_processes auto;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Performance ──────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # File cache for hot segments
    open_file_cache max=10000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;

    # Gzip for manifests
    gzip on;
    gzip_types application/vnd.apple.mpegurl application/dash+xml application/json text/plain;
    gzip_min_length 256;

    # Custom MIME types for streaming
    types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t ts;
        video/mp4 mp4 m4s;
    }

    # Logging
    log_format streaming '$remote_addr - [$time_local] "$request" $status $body_bytes_sent "$http_referer" rt=$request_time';
    access_log /var/log/nginx/access.log streaming;

    upstream api_backend {
        server app:3000;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 5120m;

        # ── Stream segments (static, immutable) ──────────────────────
        location /streams/ {
            # Optional: auth_request for signed URL validation
            # Uncomment the next two lines to enable signed URL enforcement
            # auth_request /internal/auth-segment;
            # auth_request_set $auth_status $upstream_status;

            alias /data/streams/;

            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Expose-Headers "Content-Range, Content-Length";

            # Enable range requests for seeking
            add_header Accept-Ranges bytes;

            # CORS preflight
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "*";
                add_header Access-Control-Allow-Methods "GET, OPTIONS";
                add_header Access-Control-Allow-Headers "Range";
                add_header Access-Control-Max-Age 86400;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }
        }

        # ── Manifest files (short cache) ─────────────────────────────
        location ~* \.m3u8$ {
            # Serve from streams directory
            root /data;
            try_files $uri @api;

            add_header Cache-Control "public, max-age=2";
            add_header Access-Control-Allow-Origin "*";
        }

        # ── Thumbnails ───────────────────────────────────────────────
        location /thumbnails/ {
            alias /data/thumbnails/;

            add_header Cache-Control "public, max-age=86400";
            add_header Access-Control-Allow-Origin "*";
        }

        # ── Auth request endpoint (internal) ─────────────────────────
        location = /internal/auth-segment {
            internal;
            proxy_pass http://api_backend/api/auth-segment$is_args$args;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }

        # ── API endpoints ────────────────────────────────────────────
        location /api/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Upload timeout
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # ── Frontend (SPA) ───────────────────────────────────────────
        location / {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Fallback ─────────────────────────────────────────────────
        location @api {
            proxy_pass http://api_backend;
        }
    }
}
